<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vaso — Grafici Storici</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&swap" rel="stylesheet"/>
  <style>
    :root { --bg: #080808; --surface: #101010; --border: rgba(255,255,255,0.06); --text: #f0f0f0; --text-secondary: #6e6e6e; --accent: #4ade80; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    
    header { 
      padding: 16px 24px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(8,8,8,0.8);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo-text { font-family: 'DM Serif Display', serif; font-size: 24px; }
    
    /* Navigazione aggiunta */
    nav { display: flex; gap: 20px; }
    nav a { 
      color: var(--text-secondary); 
      text-decoration: none; 
      font-size: 14px; 
      font-weight: 500; 
      transition: color 0.2s;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }

    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-top: 20px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 16px; }
    
    .time-selector { display: flex; gap: 10px; margin-bottom: 20px; }
    .time-btn { background: #161616; color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; cursor: pointer; }
    .time-btn.active { background: var(--accent); color: #000; }
    
    canvas { width: 100% !important; height: 250px !important; }
    .status { font-size: 12px; color: var(--text-secondary); }
  </style>
</head>
<body>

  <header>
    <div class="logo-text">Vaso</div>
    
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="grafici.html" class="active">Grafici</a>
      <a href="consigli.html">Consigli</a>
    </nav>

    <div class="status" id="authStatus">Verifica accesso...</div>
  </header>

  <main>
    <div class="time-selector">
      <button class="time-btn active" onclick="changeTf('24h', this)">24h</button>
      <button class="time-btn" onclick="changeTf('7d', this)">7 giorni</button>
      <button class="time-btn" onclick="changeTf('all', this)">Tutto</button>
    </div>

    <div class="charts-grid">
      <div class="chart-card"><h4>Temperatura (°C)</h4><canvas id="tempChart"></canvas></div>
      <div class="chart-card"><h4>Umidità Aria (%)</h4><canvas id="humChart"></canvas></div>
      <div class="chart-card"><h4>Umidità Terreno (%)</h4><canvas id="soilChart"></canvas></div>
      <div class="chart-card"><h4>Livello Acqua (%)</h4><canvas id="tankChart"></canvas></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs1nz0VPtYxlXUDEB-z8XGNNe5w0c0VXw",
      authDomain: "vasotest-7133a.firebaseapp.com",
      databaseURL: "https://vasotest-7133a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "vasotest-7133a",
      storageBucket: "vasotest-7133a.firebasestorage.app",
      appId: "1:291811803411:web:c01e2b199a7f812b911ae6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let charts = {};

    function updateChart(id, label, data, color) {
      if (charts[id]) charts[id].destroy();
      const ctx = document.getElementById(id).getContext('2d');
      charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})),
          datasets: [{ 
            label: label, 
            data: data.map(d => d.v), 
            borderColor: color, 
            backgroundColor: color + '22', // Aggiunge un po' di riempimento trasparente
            tension: 0.3, 
            fill: true 
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { 
            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6e6e6e' } },
            x: { grid: { display: false }, ticks: { color: '#6e6e6e' } }
          } 
        }
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      document.getElementById('authStatus').textContent = user.email.split('@')[0];

      const userMacSnap = await get(ref(db, `vaso/${user.uid}/device_mac`));
      if (!userMacSnap.exists()) {
        alert("Errore: MAC non trovato!");
        return;
      }
      const deviceMac = userMacSnap.val();

      window.fetchDati = async function() {
        try {
          const [liveSnap, storicoSnap] = await Promise.all([
            get(ref(db, `vaso/devices/${deviceMac}/live`)),
            get(ref(db, `vaso/devices/${deviceMac}/storico`))
          ]);

          if (liveSnap.exists()) {
            const raw = storicoSnap.val() || {};
            let history = [];

            Object.keys(raw).forEach(k => {
              const node = raw[k];
              if (node.temperature !== undefined) history.push(node);
              else Object.values(node).forEach(inner => history.push(inner));
            });

            history.sort((a, b) => a.timestamp - b.timestamp);

            updateChart('tempChart', 'Temp', history.map(h => ({t: h.timestamp, v: h.temperature})), '#f59e0b');
            updateChart('humChart', 'Umidità Aria', history.map(h => ({t: h.timestamp, v: h.humidity})), '#38bdf8');
            updateChart('soilChart', 'Umidità Terreno', history.map(h => ({t: h.timestamp, v: h.soil})), '#4ade80');
            updateChart('tankChart', 'Serbatoio', history.map(h => ({t: h.timestamp, v: h.tank || 0})), '#a78bfa');
          }
        } catch (e) { console.error(e); }
      };

      window.fetchDati();
      setInterval(window.fetchDati, 60000);
    });

    window.changeTf = (tf, btn) => {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.fetchDati();
    };
  </script>
</body>
</html>
