<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VASO IDRO - Grafici</title>
  <style>
    :root {
      --bg: #07130f;
      --panel: rgba(14, 31, 24, 0.86);
      --panel-2: rgba(19, 44, 34, 0.88);
      --text: #eafff4;
      --muted: #8ebca6;
      --line: rgba(130, 255, 190, 0.18);
      --green: #38ff9c;
      --green-2: #00c875;
      --yellow: #ffd166;
      --orange: #ff9f1c;
      --red: #ff4d6d;
      --cyan: #45d3ff;
      --blue: #6587ff;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 255, 156, 0.16), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(69, 211, 255, 0.12), transparent 28rem),
        linear-gradient(135deg, #06110d 0%, #081911 52%, #03100b 100%);
      overflow-x: hidden;
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar { display: none; }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image: linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(4, 15, 10, 0.76);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .back-btn {
      border: 0;
      cursor: pointer;
      color: #03100b;
      background: linear-gradient(135deg, var(--green), #9dffca);
      padding: 9px 14px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.88rem;
      box-shadow: 0 8px 16px rgba(56,255,156,.12);
      text-decoration: none;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2.8vw, 1.4rem);
      letter-spacing: 0.03em;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px 18px 36px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .chart-card {
      background: linear-gradient(180deg, var(--panel), rgba(8, 24, 17, 0.9));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 20px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .chart-header h2 {
      margin: 0;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .current-value {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .unit {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    canvas { width: 100%; height: 220px; display: block; margin-top: 6px; }

    .legend {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--muted);
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .legend span strong {
      color: var(--text);
      font-weight: 700;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(10, 27, 20, 0.72);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }

    .footer {
      margin-top: 18px;
      padding: 14px 4px 0;
      color: var(--muted);
      font-size: .82rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 560px) {
      .chart-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .current-value { font-size: 1.5rem; }
      canvas { height: 180px; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <div class="topbar">
      <a href="index.html" class="back-btn">&#8592; Home</a>
      <h1>Grafici dettaglio</h1>
      <div class="status-pill">
        <span class="dot"></span>
        <span id="connectionText">Demo</span>
      </div>
    </div>
  </header>

  <main>
    <section class="grid">
      <article class="chart-card">
        <div class="chart-header">
          <h2>&#127777; Temperatura aria</h2>
          <div><span id="temp-val" class="current-value">--</span><span class="unit"> °C</span></div>
        </div>
        <canvas id="tempChart"></canvas>
        <div class="legend">
          <span>Min: <strong id="temp-min">--</strong></span>
          <span>Max: <strong id="temp-max">--</strong></span>
          <span>Media: <strong id="temp-avg">--</strong></span>
        </div>
      </article>

      <article class="chart-card">
        <div class="chart-header">
          <h2>&#128167; Umidità aria</h2>
          <div><span id="hum-val" class="current-value">--</span><span class="unit"> %</span></div>
        </div>
        <canvas id="humChart"></canvas>
        <div class="legend">
          <span>Min: <strong id="hum-min">--</strong></span>
          <span>Max: <strong id="hum-max">--</strong></span>
          <span>Media: <strong id="hum-avg">--</strong></span>
        </div>
      </article>

      <article class="chart-card">
        <div class="chart-header">
          <h2>&#127795; Umidità substrato</h2>
          <div><span id="soil-val" class="current-value">--</span><span class="unit"> %</span></div>
        </div>
        <canvas id="soilChart"></canvas>
        <div class="legend">
          <span>Min: <strong id="soil-min">--</strong></span>
          <span>Max: <strong id="soil-max">--</strong></span>
          <span>Media: <strong id="soil-avg">--</strong></span>
        </div>
      </article>

      <article class="chart-card">
        <div class="chart-header">
          <h2>&#128672; Livello serbatoio</h2>
          <div><span id="tank-val" class="current-value">--</span><span class="unit"> %</span></div>
        </div>
        <canvas id="tankChart"></canvas>
        <div class="legend">
          <span>Min: <strong id="tank-min">--</strong></span>
          <span>Max: <strong id="tank-max">--</strong></span>
          <span>Media: <strong id="tank-avg">--</strong></span>
        </div>
      </article>
    </section>

    <div class="footer">
      <span>Ultimo aggiornamento: <strong id="lastUpdate">--</strong></span>
      <span>Storico: <span id="pointCount">0</span> rilevazioni</span>
    </div>
  </main>

  <script>
    const el = (id) => document.getElementById(id);

    const state = {
      demo: true,
      data: { temperature: 21.0, humidity: 47, soil: 62, tank: 82, timestamp: Date.now() },
      history: []
    };

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function fmt(v, d = 0) { return Number(v).toFixed(d).replace('.', ','); }

    function pushHistory() {
      state.history.push({
        t: state.data.timestamp,
        temp: state.data.temperature,
        hum: state.data.humidity,
        soil: state.data.soil,
        tank: state.data.tank
      });
      if (state.history.length > 48) state.history.shift();
    }

    function drawChart(canvasId, dataKey, minY, maxY, strokeColor, fillStart, fillEnd, unit) {
      const canvas = el(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = 440;
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.scale(1, 1);

      ctx.fillStyle = 'rgba(255,255,255,0.035)';
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 4; i++) {
        const y = 28 + i * ((h - 56) / 4);
        ctx.beginPath(); ctx.moveTo(48, y); ctx.lineTo(w - 24, y); ctx.stroke();
      }

      ctx.fillStyle = 'rgba(234,255,244,0.5)';
      ctx.font = '24px system-ui';
      ctx.fillText(maxY + unit, 12, 36);
      ctx.fillText(minY + unit, 18, h - 38);

      const data = state.history;
      if (data.length < 2) return;

      const left = 56, right = w - 28, top = 26, bottom = h - 46;
      const step = (right - left) / (data.length - 1);

      ctx.fillStyle = 'rgba(234,255,244,0.35)';
      ctx.font = '20px system-ui';
      ctx.textAlign = 'center';
      for (let i = 0; i < data.length; i++) {
        if (i % Math.ceil(data.length / 8) === 0 || i === data.length - 1) {
          const d = new Date(data[i].t);
          ctx.fillText(d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'), left + i * step, h - 12);
        }
      }
      ctx.textAlign = 'left';

      const grad = ctx.createLinearGradient(0, top, 0, bottom);
      grad.addColorStop(0, fillStart);
      grad.addColorStop(1, fillEnd);

      ctx.beginPath();
      data.forEach((p, i) => {
        const x = left + i * step;
        const val = clamp(p[dataKey], minY, maxY);
        const y = bottom - ((val - minY) / (maxY - minY)) * (bottom - top);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.lineTo(right, bottom); ctx.lineTo(left, bottom); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();

      ctx.beginPath();
      data.forEach((p, i) => {
        const x = left + i * step;
        const val = clamp(p[dataKey], minY, maxY);
        const y = bottom - ((val - minY) / (maxY - minY)) * (bottom - top);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.strokeStyle = strokeColor; ctx.lineWidth = 5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
    }

    function updateStats() {
      const data = state.history;
      if (data.length === 0) return;

      const keys = { temp: 'temp', hum: 'hum', soil: 'soil', tank: 'tank' };
      const units = { temp: '°C', hum: '%', soil: '%', tank: '%' };
      const vals = { temp: data[data.length-1].temp, hum: data[data.length-1].hum, soil: data[data.length-1].soil, tank: data[data.length-1].tank };

      for (const [key, prefix] of Object.entries(keys)) {
        const arr = data.map(d => d[key]);
        const min = Math.min(...arr);
        const max = Math.max(...arr);
        const avg = arr.reduce((a,b) => a+b,0) / arr.length;
        el(`${prefix}-val`).textContent = fmt(vals[key], key === 'temp' ? 1 : 0);
        el(`${prefix}-min`).textContent = fmt(min, key === 'temp' ? 1 : 0) + units[key];
        el(`${prefix}-max`).textContent = fmt(max, key === 'temp' ? 1 : 0) + units[key];
        el(`${prefix}-avg`).textContent = fmt(avg, key === 'temp' ? 1 : 0) + units[key];
      }

      el('pointCount').textContent = data.length;
      el('lastUpdate').textContent = new Date(data[data.length-1].t).toLocaleString('it-IT');
    }

    function render() {
      drawChart('tempChart', 'temp', 0, 50, '#ffd166', 'rgba(255,209,102,0.65)', 'rgba(255,209,102,0.02)', '°C');
      drawChart('humChart', 'hum', 0, 100, '#45d3ff', 'rgba(69,211,255,0.65)', 'rgba(69,211,255,0.02)', '%');
      drawChart('soilChart', 'soil', 0, 100, '#38ff9c', 'rgba(56,255,156,0.65)', 'rgba(56,255,156,0.02)', '%');
      drawChart('tankChart', 'tank', 0, 100, '#6587ff', 'rgba(101,135,255,0.65)', 'rgba(101,135,255,0.02)', '%');
      updateStats();
    }

    function demoTick() {
      if (!state.demo) return;
      const d = state.data;
      d.temperature = clamp(d.temperature + (Math.random() - 0.48) * 0.35, 16, 31);
      d.humidity = clamp(d.humidity + (Math.random() - 0.5) * 1.2, 35, 78);
      d.soil = clamp(d.soil + (Math.random() - 0.52) * 1.8, 22, 88);
      d.tank = clamp(d.tank - Math.random() * 0.22, 0, 100);
      d.timestamp = Date.now();
      pushHistory();
      render();
    }

    function updateFromRemote(payload) {
      state.demo = false;
      el('connectionText').textContent = 'Live';

      state.data = {
        temperature: Number(payload.temperature ?? payload.temp ?? state.data.temperature),
        humidity: Number(payload.humidity ?? payload.hum ?? state.data.humidity),
        soil: Number(payload.soil ?? payload.soilHumidity ?? state.data.soil),
        tank: Number(payload.tank ?? payload.waterLevel ?? state.data.tank),
        timestamp: Number(payload.timestamp ?? Date.now())
      };

      pushHistory();
      render();
    }

    window.updateFromRemote = updateFromRemote;

    // init storico
    const now = Date.now();
    for (let i = 0; i < 24; i++) {
      state.history.push({
        t: now - (24 - i) * 1800000,
        temp: clamp(22 + (Math.random() - 0.5) * 6, 15, 32),
        hum: clamp(50 + (Math.random() - 0.5) * 20, 30, 75),
        soil: clamp(55 + (Math.random() - 0.5) * 30, 20, 85),
        tank: clamp(75 + (Math.random() - 0.5) * 20, 20, 100)
      });
    }
    render();
    setInterval(demoTick, 3000);
    window.addEventListener('resize', render);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs1nz0VPtYxlXUDEB-z8XGNNe5w0c0VXw",
      authDomain: "vasotest-7133a.firebaseapp.com",
      databaseURL: "https://vasotest-7133a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "vasotest-7133a",
      storageBucket: "vasotest-7133a.firebasestorage.app",
      messagingSenderId: "291811803411",
      appId: "1:291811803411:web:c01e2b199a7f812b911ae6",
      measurementId: "G-WRRE3DV7DR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const latestRef = ref(db, "vaso/latest");
    const intervalloAggiornamento = 10000;

    async function recuperaDati() {
      try {
        const snapshot = await get(latestRef);
        if (snapshot.exists()) {
          const data = snapshot.val();
          if (typeof window.updateFromRemote === "function") window.updateFromRemote(data);
        }
      } catch (error) { console.error("Errore Firebase:", error); }
    }

    recuperaDati();
    setInterval(recuperaDati, intervalloAggiornamento);
  </script>
</body>
</html>
