<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vaso — Grafici</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    /* CSS originale mantenuto per brevità, lo stesso che hai inviato tu */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #080808; --surface: #101010; --surface-2: #161616; --border: rgba(255,255,255,0.06); --text: #f0f0f0; --text-secondary: #6e6e6e; --accent: #4ade80; --radius: 16px; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { position: sticky; top: 0; z-index: 50; background: rgba(8,8,8,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .topbar { max-width: 1120px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo-text { font-family: 'DM Serif Display', serif; font-size: 1.25rem; }
    .nav a { padding: 8px 16px; color: var(--text-secondary); text-decoration: none; font-size: 0.8125rem; }
    .nav a.active { color: var(--text); background: var(--surface-2); border-radius: 999px; }
    main { max-width: 1120px; margin: 0 auto; padding: 32px 24px; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    canvas { width: 100%; height: 200px; }
    .time-selector { display: flex; gap: 8px; margin-bottom: 24px; }
    .time-btn { padding: 8px 16px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; }
    .time-btn.active { background: var(--accent); color: #080808; }
    @media (max-width: 780px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header>
    <div class="topbar">
      <div class="logo-group"><span class="logo-text">Vaso</span></div>
      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="grafici.html" class="active">Grafici</a>
      </nav>
      <div class="status-text" id="connectionText">In attesa...</div>
    </div>
  </header>

  <main>
    <div class="time-selector">
      <button class="time-btn active" data-tf="24h" onclick="selectTimeframe(this)">24h</button>
      <button class="time-btn" data-tf="7d" onclick="selectTimeframe(this)">7 giorni</button>
      <button class="time-btn" data-tf="all" onclick="selectTimeframe(this)">Tutto</button>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <p class="chart-title">Temperatura Aria</p>
        <h3 id="temp-val">--</h3>
        <canvas id="tempChart"></canvas>
      </div>
      <div class="chart-card">
        <p class="chart-title">Umidità Aria</p>
        <h3 id="hum-val">--</h3>
        <canvas id="humChart"></canvas>
      </div>
      <div class="chart-card">
        <p class="chart-title">Umidità Substrato</p>
        <h3 id="soil-val">--</h3>
        <canvas id="soilChart"></canvas>
      </div>
      <div class="chart-card">
        <p class="chart-title">Serbatoio</p>
        <h3 id="tank-val">--</h3>
        <canvas id="tankChart"></canvas>
      </div>
    </div>
  </main>

  <script>
    const state = { history: [] };
    const el = (id) => document.getElementById(id);

    function drawChart(canvasId, key, minY, maxY, color, unit) {
      const canvas = el(canvasId);
      if (!canvas || state.history.length < 2) return;
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.offsetWidth * 2;
      const h = canvas.height = 400;
      ctx.clearRect(0, 0, w, h);

      const pad = { l: 60, r: 20, t: 30, b: 40 };
      const cw = w - pad.l - pad.r;
      const ch = h - pad.t - pad.b;

      // Disegna Linea
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 5;
      state.history.forEach((p, i) => {
        const x = pad.l + (i * (cw / (state.history.length - 1)));
        const val = Math.max(minY, Math.min(maxY, p[key]));
        const y = (h - pad.b) - ((val - minY) / (maxY - minY)) * ch;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    window.updateFromRemote = function(liveData, storicoData) {
      el('connectionText').textContent = 'Live';
      // Mappatura dati
      state.history = storicoData.map(d => ({
        t: d.timestamp,
        temp: d.temperature,
        hum: d.humidity,
        soil: d.soil,
        tank: d.tank
      }));
      
      // Update valori testuali
      el('temp-val').textContent = (liveData.temperature || liveData.temp || 0) + " °C";
      el('hum-val').textContent = (liveData.humidity || liveData.hum || 0) + " %";
      el('soil-val').textContent = (liveData.soil || liveData.soilHumidity || 0) + " %";
      
      drawChart('tempChart', 'temp', 0, 45, '#f59e0b', '°C');
      drawChart('humChart', 'hum', 0, 100, '#38bdf8', '%');
      drawChart('soilChart', 'soil', 0, 100, '#4ade80', '%');
      drawChart('tankChart', 'tank', 0, 100, '#a78bfa', '%');
    };

    window.selectTimeframe = function(btn) {
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.currentTimeframe = btn.dataset.tf;
      if(window.fetchDati) window.fetchDati();
    };
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, get, query, orderByKey, startAt } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs1nz0VPtYxlXUDEB-z8XGNNe5w0c0VXw",
      authDomain: "vasotest-7133a.firebaseapp.com",
      databaseURL: "https://vasotest-7133a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "vasotest-7133a",
      storageBucket: "vasotest-7133a.firebasestorage.app",
      appId: "1:291811803411:web:c01e2b199a7f812b911ae6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const deviceMac = "2C_BC_BB_0E_1A_D0"; // Inserito manualmente per test

    window.fetchDati = async function() {
      try {
        const liveSnap = await get(ref(db, `vaso/devices/${deviceMac}/live`));
        const storicoSnap = await get(ref(db, `vaso/devices/${deviceMac}/storico`));
        
        if (liveSnap.exists()) {
          const rawStorico = storicoSnap.val() || {};
          let parsedStorico = [];

          // Logica per estrarre dati anche se annidati
          Object.keys(rawStorico).forEach(key => {
            const node = rawStorico[key];
            if (node.temperature !== undefined) {
               parsedStorico.push(node);
            } else {
               // Se c'è un push ID (es. -Os6...)
               Object.values(node).forEach(inner => parsedStorico.push(inner));
            }
          });

          parsedStorico.sort((a, b) => a.timestamp - b.timestamp);
          window.updateFromRemote(liveSnap.val(), parsedStorico);
        }
      } catch (e) { console.error(e); }
    };

    window.fetchDati();
    setInterval(window.fetchDati, 60000);
  </script>
</body>
</html>
