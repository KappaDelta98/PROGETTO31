<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vaso — Registrati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: #101010;
      --surface-2: #161616;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text: #f0f0f0;
      --text-secondary: #6e6e6e;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.1);
      --danger: #ef4444;
      --danger-dim: rgba(239,68,68,0.1);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
    }

    .auth-header { text-align: center; margin-bottom: 32px; }
    .auth-logo { width: 40px; height: 40px; color: var(--accent); margin: 0 auto 16px; }
    .auth-header h1 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; font-weight: 400; margin-bottom: 6px; }
    .auth-header p { color: var(--text-secondary); font-size: 0.875rem; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
    .form-group input { width: 100%; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface-2); color: var(--text); font-size: 0.9375rem; font-family: inherit; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-secondary); opacity: 0.5; }

    .strength-bar { height: 3px; border-radius: 999px; background: rgba(255,255,255,0.06); margin-top: 8px; overflow: hidden; }
    .strength-bar-fill { height: 100%; width: 0%; border-radius: 999px; transition: width 0.3s, background 0.3s; }

    .btn { width: 100%; padding: 13px 16px; border-radius: var(--radius); border: none; font-size: 0.875rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #080808; }
    .btn-google { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 12px; }
    .btn-google svg { width: 16px; height: 16px; }

    .divider { display: flex; align-items: center; gap: 14px; margin: 20px 0; color: var(--text-secondary); font-size: 0.75rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 0.8125rem; color: var(--text-secondary); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }

    .error-msg { background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius); padding: 12px 14px; font-size: 0.8125rem; color: var(--danger); margin-bottom: 16px; display: none; }
    .error-msg.visible { display: block; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(8,8,8,0.3); border-top-color: #080808; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <main class="auth-card">
    <div class="auth-header">
      <svg class="auth-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22V8"/><path d="M5 12c0-3.87 3.13-7 7-7s7 3.13 7 7"/>
        <path d="M8 5.5C8 5.5 6 8 6 10"/><path d="M16 5.5c0 0 2 2.5 2 4.5"/>
        <path d="M9 22h6"/>
      </svg>
      <h1>Crea account</h1>
      <p>Registrati per accedere alla dashboard</p>
    </div>

    <div id="errorBox" class="error-msg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nome@esempio.it" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimo 6 caratteri" required minlength="6" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Conferma password</label>
        <input type="password" id="confirmPassword" placeholder="Ripeti la password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Registrati</button>
    </form>

    <div class="divider">oppure</div>

    <button class="btn btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Registrati con Google
    </button>

    <div class="auth-footer">
      Hai già un account? <a href="login.html">Accedi</a>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs1nz0VPtYxlXUDEB-z8XGNNe5w0c0VXw",
      authDomain: "vasotest-7133a.firebaseapp.com",
      databaseURL: "https://vasotest-7133a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "vasotest-7133a",
      storageBucket: "vasotest-7133a.firebasestorage.app",
      messagingSenderId: "291811803411",
      appId: "1:291811803411:web:c01e2b199a7f812b911ae6",
      measurementId: "G-WRRE3DV7DR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => { if (user) { window.location.href = "index.html"; } });

    const errorBox = document.getElementById("errorBox");
    const passwordInput = document.getElementById("password");
    const strengthFill = document.getElementById("strengthFill");
    const registerBtn = document.getElementById("registerBtn");
    const googleBtn = document.getElementById("googleBtn");

    const errorMessages = {
      "auth/email-already-in-use": "Questa email è già registrata.",
      "auth/invalid-email": "Email non valida.",
      "auth/weak-password": "Password troppo debole (minimo 6 caratteri).",
      "auth/popup-closed-by-user": "Registrazione annullata.",
      "auth/popup-blocked": "Popup bloccato. Consent i popup per questo sito.",
    };

    function showError(code) {
      errorBox.textContent = errorMessages[code] || "Errore durante la registrazione.";
      errorBox.classList.add("visible");
    }

    function hideError() { errorBox.classList.remove("visible"); }

    function setLoading(loading) {
      registerBtn.disabled = loading;
      googleBtn.disabled = loading;
      registerBtn.innerHTML = loading ? '<span class="spinner"></span>' : 'Registrati';
    }

    passwordInput.addEventListener("input", () => {
      const v = passwordInput.value;
      let s = 0;
      if (v.length >= 6) s++;
      if (v.length >= 10) s++;
      if (/[A-Z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      const colors = ["#ef4444", "#f59e0b", "#eab308", "#4ade80", "#22c55e"];
      strengthFill.style.width = (s / 5 * 100) + '%';
      strengthFill.style.background = colors[s - 1] || "rgba(255,255,255,0.1)";
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      const pw = passwordInput.value;
      const confirm = document.getElementById("confirmPassword").value;
      if (pw !== confirm) { showError("Le password non corrispondono."); return; }
      if (pw.length < 6) { showError("La password deve avere almeno 6 caratteri."); return; }
      setLoading(true);
      try {
        await createUserWithEmailAndPassword(auth, document.getElementById("email").value.trim(), pw);
      } catch (err) { setLoading(false); showError(err.code); }
    });

    googleBtn.addEventListener("click", async () => {
      hideError();
      setLoading(true);
      try { await signInWithPopup(auth, new GoogleAuthProvider()); }
      catch (err) { setLoading(false); showError(err.code); }
    });
  </script>
</body>
</html>
