<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VASO IDRO - Registrati</title>
  <style>
    :root {
      --bg: #07130f;
      --panel: rgba(14, 31, 24, 0.86);
      --panel-2: rgba(19, 44, 34, 0.88);
      --text: #eafff4;
      --muted: #8ebca6;
      --line: rgba(130, 255, 190, 0.18);
      --green: #38ff9c;
      --green-2: #00c875;
      --yellow: #ffd166;
      --red: #ff4d6d;
      --cyan: #45d3ff;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 255, 156, 0.16), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(69, 211, 255, 0.12), transparent 28rem),
        linear-gradient(135deg, #06110d 0%, #081911 52%, #03100b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .noise {
      position: fixed; inset: 0; pointer-events: none; opacity: 0.08;
      background-image: linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, var(--panel), rgba(8, 24, 17, 0.9));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 36px 28px;
      position: relative;
      z-index: 1;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, rgba(56,255,156,.24), rgba(69,211,255,.12));
      border: 1px solid rgba(56,255,156,.35);
      box-shadow: 0 0 30px rgba(56,255,156,.14);
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .auth-header h1 {
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .auth-header p {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(7, 19, 15, 0.7);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(56, 255, 156, 0.15);
    }

    .form-group input::placeholder {
      color: rgba(142, 188, 166, 0.5);
    }

    .password-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover { transform: translateY(-2px); opacity: 0.92; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--green-2), var(--green));
      color: #07130f;
    }

    .btn-google {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-google svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { text-decoration: underline; }

    .error-msg {
      background: rgba(255, 77, 109, 0.12);
      border: 1px solid rgba(255, 77, 109, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .success-msg {
      background: rgba(56, 255, 156, 0.12);
      border: 1px solid rgba(56, 255, 156, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--green);
      margin-bottom: 16px;
      display: none;
    }

    .success-msg.visible { display: block; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(7, 19, 15, 0.3);
      border-top-color: #07130f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .password-strength {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.08);
      margin-top: 6px;
      overflow: hidden;
    }

    .password-strength .bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <main class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🌱</div>
      <h1>Crea account</h1>
      <p>Registrati per accedere alla dashboard</p>
    </div>

    <div id="errorBox" class="error-msg"></div>
    <div id="successBox" class="success-msg"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="nome@esempio.it" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimo 6 caratteri" required minlength="6" autocomplete="new-password" />
        <div class="password-strength"><div class="bar" id="strengthBar"></div></div>
        <div class="password-hint">Almeno 6 caratteri</div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Conferma password</label>
        <input type="password" id="confirmPassword" placeholder="Ripeti la password" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">
        Registrati
      </button>
    </form>

    <div class="divider">oppure</div>

    <button class="btn btn-google" id="googleBtn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Registrati con Google
    </button>

    <div class="auth-footer">
      Hai già un account? <a href="login.html">Accedi</a>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDs1nz0VPtYxlXUDEB-z8XGNNe5w0c0VXw",
      authDomain: "vasotest-7133a.firebaseapp.com",
      databaseURL: "https://vasotest-7133a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "vasotest-7133a",
      storageBucket: "vasotest-7133a.firebasestorage.app",
      messagingSenderId: "291811803411",
      appId: "1:291811803411:web:c01e2b199a7f812b911ae6",
      measurementId: "G-WRRE3DV7DR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");
    const registerForm = document.getElementById("registerForm");
    const registerBtn = document.getElementById("registerBtn");
    const googleBtn = document.getElementById("googleBtn");
    const passwordInput = document.getElementById("password");
    const strengthBar = document.getElementById("strengthBar");

    passwordInput.addEventListener("input", () => {
      const val = passwordInput.value;
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const pct = (strength / 5) * 100;
      const colors = ["#ff4d6d", "#ff9f1c", "#ffd166", "#00c875", "#38ff9c"];
      strengthBar.style.width = pct + "%";
      strengthBar.style.background = colors[strength - 1] || "rgba(255,255,255,0.1)";
    });

    function showError(msg) {
      const errors = {
        "auth/email-already-in-use": "Questa email è già registrata.",
        "auth/invalid-email": "Email non valida.",
        "auth/weak-password": "Password troppo debole (minimo 6 caratteri).",
        "auth/popup-closed-by-user": "Registrazione con Google annullata.",
        "auth/popup-blocked": "Popup bloccato dal browser. Consent i popup per questo sito.",
        "auth/cancelled-popup-request": "Popup annullato.",
      };
      errorBox.textContent = errors[msg] || "Errore durante la registrazione. Riprova.";
      errorBox.classList.add("visible");
      successBox.classList.remove("visible");
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.classList.add("visible");
      errorBox.classList.remove("visible");
    }

    function hideMessages() {
      errorBox.classList.remove("visible");
      successBox.classList.remove("visible");
    }

    function setLoading(loading) {
      registerBtn.disabled = loading;
      googleBtn.disabled = loading;
      registerBtn.innerHTML = loading ? '<span class="spinner"></span>' : "Registrati";
    }

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showError("Le password non corrispondono.");
        return;
      }

      if (password.length < 6) {
        showError("La password deve avere almeno 6 caratteri.");
        return;
      }

      setLoading(true);

      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (error) {
        setLoading(false);
        showError(error.code);
      }
    });

    googleBtn.addEventListener("click", async () => {
      hideMessages();
      setLoading(true);

      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        setLoading(false);
        showError(error.code);
      }
    });
  </script>
</body>
</html>
